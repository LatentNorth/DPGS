METHOD:
  method: 'DPGS'

  # Prototype transformation and soft k-means.
  beta: 0.6
  gamma: 0.15
  T_km: 15
  nIter_km: 40

  # Graph propagation and optimal transport.
  alpha_pslp: 0.5
  beta_pslp: 0.3
  k_graph: 30
  ot_epsilon: 0.001
  ot_max_iters: 50

  # Adaptive neighborhood size.
  k_min: 3
  k_max: 6

  # Task-specific FiLM adaptation.
  film_hidden_dim: 128
  film_lr: 0.001
  film_inner_steps: 10
  lambda_ce: 0.4
  lambda_cluster: 0.6
  lambda_inter_sep: 0.2
  lambda_intra_compact: 0.3
  cluster_prob_thresh: 0.95
  cluster_rho_thresh_percentile: 50
